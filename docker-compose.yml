services:
  db:
    image: postgres:16
    container_name: marketplace-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres # try actual passwords in production
      POSTGRES_DB: marketplace
    ports:
      - "5433:5432"
    volumes:
      - marketplace_pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ./server
    container_name: marketplace-server
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@db:5432/marketplace
      JWT_SECRET: trust_no_3
    depends_on:
      - db
    volumes:
      - ./server:/app
      - /app/node_modules
    command: npm run dev

    client:
      build:
        context: ./client
        dockerfile: Dockerfile
      container_name: marketplace-client
      restart: unless-stopped
      ports:
        - "5173:5173"
      environment:
        VITE_API_BASE_URL: http://localhost:4000
      depends_on:
        - server
      # SAVE FOR LATER: We can use volumes for development to enable hot reloading, but for now we'll just build the client and run it in production mode
      # volumes:
      #   - ./client:/app
      #   - /app/node_modules
      # command: npm start

volumes:
  marketplace_pgdata: