services:
  db:
    image: postgres:16
    container_name: marketplace-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marketplace
    ports:
      - "5433:5432"
    volumes:
      - marketplace_pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ./server
    container_name: marketplace-server
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@db:5432/marketplace
    depends_on:
      - db
    volumes:
      - ./server:/app
      - /app/node_modules
    command: npm run dev

volumes:
  marketplace_pgdata: